<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preload" href="assets/fonts/abc-whyte.woff2" as="font" type="font/woff2" crossorigin>

<body class="is-preload">
    <div class="grid" id="grid" aria-hidden="true"></div>

    <header class="top-bar">

            <div class="top-bar__motion">

    <main>

        <section class="err" aria-label="Страница не найдена">

                <div class="err__stage">

                    <p class="err__text">Кажется,<br>вы <span class="err__rand">(случайно)</span><br>сошли с маршрута</p>

        <section class="err-m" aria-label="Страница не найдена">

                <img class="err-m__lines" src="assets/images/altitude-lines-mobile.svg" alt="" aria-hidden="true">

                <span class="err-m__bureau">bureau</span>
                <span class="err-m__est">est.2026</span>
                <button class="err-m__nav" type="button" aria-label="Меню">
                    <span class="err-m__burger"><span></span><span></span><span></span></span>
                </button>

                <p class="err-m__text">кажется, вы сошли с маршрута</p>

                <a class="err-m__cta" href="index.html">на главную страницу</a>
            </div>

    <script src="assets/js/grid.js"></script>
    <script src="assets/js/error.js"></script>

</html>
